# ============================================================
# docker-compose.yml — Wędzarnia IoT
# Dostęp: https://wedzarnia.pikur.eu (przez Nginx Proxy Manager)
#
# Użycie:
#   docker compose up --build -d
#   docker compose down
#   docker compose logs -f
# ============================================================

services:

  wedzarnia:
    build:
      context: .
      dockerfile: Dockerfile
      # Zmienne Supabase wbudowywane w czasie budowania (Vite build-time)
      args:
        VITE_SUPABASE_URL:              ${VITE_SUPABASE_URL}
        VITE_SUPABASE_PUBLISHABLE_KEY:  ${VITE_SUPABASE_PUBLISHABLE_KEY}
        VITE_SUPABASE_PROJECT_ID:       ${VITE_SUPABASE_PROJECT_ID}
    container_name: wedzarnia-pwa
    ports:
      - "8080:80"          # Nginx Proxy Manager przekierowuje tu z wedzarnia.pikur.eu
    restart: unless-stopped
    environment:
      - TZ=Europe/Warsaw
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:80"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

