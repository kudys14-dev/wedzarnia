server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_types
        text/plain
        text/css
        application/json
        application/javascript
        text/xml
        application/xml
        image/svg+xml
        font/woff2;

    # Nagłówki bezpieczeństwa
    add_header X-Frame-Options "SAMEORIGIN"          always;
    add_header X-Content-Type-Options "nosniff"      always;
    add_header X-XSS-Protection "1; mode=block"      always;
    add_header Referrer-Policy "strict-origin"       always;

    # React Router — każda ścieżka wraca do index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Pliki JS/CSS z hashem w nazwie — cache na rok (immutable)
    location ~* \.(js|css)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Pozostałe assety — cache na tydzień
    location ~* \.(png|ico|svg|woff2|webp)$ {
        expires 7d;
        add_header Cache-Control "public";
    }

    # Blokuj dostęp do plików ukrytych (.env, .git itp.)
    location ~ /\. {
        deny all;
    }
}
