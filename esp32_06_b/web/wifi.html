<!DOCTYPE html>
<html lang="pl">
<head><meta charset='utf-8'><title>WiFi</title><meta name="viewport" content="width=device-width,initial-scale=1"><link rel="stylesheet" href="/style.css"></head>
<body><div class="page-wrap">
<div class="page-header"><h2>📶 Konfiguracja WiFi</h2></div>
<div class="card">
<form method="POST" action="/wifi/save">
<label>Nazwa sieci (SSID)</label><input type="text" name="ssid" value="SSID_PLACEHOLDER" autocomplete="off">
<label>Hasło</label><input type="password" name="pass" autocomplete="current-password">
<button type="submit" class="btn btn-primary" style="margin-top:14px">📶 Połącz</button>
</form>
</div>
<a class="back-link" href="/">⬅️ Wróć</a>
</div></body></html>
